defaults:
  - /model: qwen2.5-7b-instruct
  - /dataset: polyrefuse
  - _self_

representations_root: artifacts/omniguard_representations/${model.name}
output_root: artifacts/omniguard_uscore/${model.name}

anchor_language: en
split: train
subsets: [harmful, harmless]
layers: all
selection_tiers: [high]

hydra:
  run:
    dir: ${output_root}
  job:
    chdir: false
